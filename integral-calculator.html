<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integral Calculator</title>
    <meta name="description" content="An online integral calculator that computes integrals of functions quickly and accurately.">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Integral Calculator",
        "description": "A tool to calculate integrals of functions online.",
        "url": "https://yourwebsite.com/integral-calculator",
        "applicationCategory": "EducationalApplication"
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            text-align: center;
        }
        input, button {
            width: 80%;
            max-width: 400px;
            margin: 10px 0;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
        }
        @media (max-width: 480px) {
            input, button {
                font-size: 16px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Integral Calculator</h2>
        <input type="text" id="function" placeholder="Enter function (e.g. x^2 + 3x)">
        <button onclick="calculateIntegral()">Calculate Integral</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateIntegral() {
            let func = document.getElementById("function").value;
            
            try {
                let integral = math.integral(func, 'x').toString();
                document.getElementById("result").innerText = `Integral: ${integral} + C`;
            } catch (error) {
                document.getElementById("result").innerText = "Invalid function. Please try again.";
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.3.1/math.min.js"></script>
</body>
</html>
