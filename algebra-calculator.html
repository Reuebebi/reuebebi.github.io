<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Solve algebraic equations easily with our responsive algebra calculator. Supports linear, quadratic, and polynomial equations.">
    <meta name="keywords" content="algebra calculator, math solver, equation solver, quadratic equation">
    <meta name="author" content="WhizMath">
    <title>Algebra Calculator - WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(to right, #1e3c72, #2a5298); color: white; }
        .calculator-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .calculator-card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; }
        .btn-primary { background-color: #ff9800; border: none; }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Algebra Calculator",
        "url": "https://whizmath.com/algebra-calculator",
        "author": {
            "@type": "Person",
            "name": "WhizMath"
        },
        "description": "Solve algebraic equations instantly with this responsive online algebra calculator.",
        "applicationCategory": "EducationalApplication"
    }
    </script>
</head>
<body>
    <div class="container calculator-container">
        <div class="calculator-card text-center p-4 shadow-lg">
            <h2 class="mb-4">Algebra Calculator</h2>
            <input type="text" id="equation" class="form-control mb-3" placeholder="Enter equation (e.g., 2x + 3 = 7)">
            <button class="btn btn-primary w-100" onclick="solveEquation()">Solve</button>
            <h4 class="mt-3" id="solution"></h4>
        </div>
    </div>
    
    <script>
        function solveEquation() {
            let equation = document.getElementById("equation").value;
            try {
                let solution = nerdamer.solve(equation, 'x').toString();
                document.getElementById("solution").innerText = "Solution: x = " + solution;
            } catch (error) {
                document.getElementById("solution").innerText = "Invalid equation! Please enter a valid algebraic equation.";
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.8/nerdamer.core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.8/Algebra.min.js"></script>
</body>
</html>
