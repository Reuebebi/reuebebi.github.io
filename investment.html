        <h1>Finance & Investment Math</h1>

        <h2>📈 Investment Calculator</h2>
        <div class="calculator p-4">
            <label for="principal">Initial Investment ($):</label>
            <input type="number" id="principal" class="form-control mb-2" placeholder="Enter amount" required>
            
            <label for="rate">Annual Interest Rate (%):</label>
            <input type="number" id="rate" class="form-control mb-2" placeholder="Enter rate" required>
            
            <label for="years">Years:</label>
            <input type="number" id="years" class="form-control mb-2" placeholder="Enter years" required>
            
            <label for="compound">Times Compounded Per Year:</label>
            <input type="number" id="compound" class="form-control mb-2" placeholder="Enter frequency" required>
            
            <button class="btn btn-primary mt-2" onclick="calculateInvestment()">Calculate</button>
            
            <h3 class="mt-3">Future Value: <span id="result">$0.00</span></h3>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function calculateInvestment() {
            let P = parseFloat(document.getElementById('principal').value);
            let r = parseFloat(document.getElementById('rate').value) / 100;
            let t = parseFloat(document.getElementById('years').value);
            let n = parseFloat(document.getElementById('compound').value);
            
            if (isNaN(P) || isNaN(r) || isNaN(t) || isNaN(n) || P <= 0 || r <= 0 || t <= 0 || n <= 0) {
                document.getElementById('result').innerText = 'Invalid Input';
                return;
            }
            
            let A = P * Math.pow((1 + r / n), (n * t));
            document.getElementById('result').innerText = '$' + A.toFixed(2);
        }
    </script>
