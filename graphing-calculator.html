<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Graphing Calculator - Plot mathematical functions easily with this online tool.">
    <meta name="keywords" content="Graphing Calculator, Math Graph, Function Plotter, Online Calculator">
    <meta name="author" content="WhizMath">
    <title>Graphing Calculator | WhizMath</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8470165109508371"
     crossorigin="anonymous"></script>
    
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Graphing Calculator",
        "description": "A powerful online tool to plot mathematical functions graphically.",
        "applicationCategory": "Educational",
        "url": "https://whizmath.com/graphing-calculator"
    }
    </script>
    
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.min.js"></script>
    <style>
        body {
            background: white;
            color: black;
            text-align: center;
        }
        .graph-container {
            max-width: 800px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">Graphing Calculator</h1>
        <p>Enter a mathematical function (e.g., sin(x), x^2 + 2x - 3) and plot the graph.</p>
        <div class="graph-container">
            <input type="text" id="functionInput" class="form-control" placeholder="Enter function (e.g., x^2)">
            <button class="btn btn-primary mt-3" onclick="plotGraph()">Plot Graph</button>
            <canvas id="graphCanvas" class="mt-4"></canvas>
        </div>
    </div>
    
    <script>
        function plotGraph() {
            let inputFunction = document.getElementById("functionInput").value;
            let ctx = document.getElementById("graphCanvas").getContext("2d");
            let xValues = [], yValues = [];
            
            for (let x = -10; x <= 10; x += 0.1) {
                xValues.push(x);
                try {
                    yValues.push(math.evaluate(inputFunction, {x: x}));
                } catch (e) {
                    alert("Invalid function. Please enter a valid expression.");
                    return;
                }
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xValues,
                    datasets: [{
                        label: `y = ${inputFunction}`,
                        data: yValues,
                        borderColor: 'blue',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: 'X-Axis' } },
                        y: { title: { display: true, text: 'Y-Axis' } }
                    }
                }
            });
        }
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
