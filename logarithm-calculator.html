<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logarithm Calculator</title>
    <meta name="description" content="An online logarithm calculator that computes log values for any base.">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Logarithm Calculator",
        "description": "A tool to calculate logarithms for any base.",
        "url": "https://yourwebsite.com/logarithm-calculator",
        "applicationCategory": "EducationalApplication"
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            text-align: center;
        }
        input, button {
            width: 80%;
            max-width: 400px;
            margin: 10px 0;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
        }
        @media (max-width: 480px) {
            input, button {
                font-size: 16px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Logarithm Calculator</h2>
        <input type="number" id="number" placeholder="Enter number">
        <input type="number" id="base" placeholder="Enter base (default is 10)">
        <button onclick="calculateLog()">Calculate Log</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateLog() {
            let number = parseFloat(document.getElementById("number").value);
            let base = parseFloat(document.getElementById("base").value) || 10;
            
            if (number > 0 && base > 0 && base !== 1) {
                let logValue = Math.log(number) / Math.log(base);
                document.getElementById("result").innerText = `Logarithm: ${logValue.toFixed(6)}`;
            } else {
                document.getElementById("result").innerText = "Invalid input. Ensure number and base are positive, and base is not 1.";
            }
        }
    </script>
    <script type='text/javascript' src='//pl26627928.profitableratecpm.com/dc/ed/3b/dced3b21bace3293dc34b16c68937c68.js'></script>
</body>
</html>
