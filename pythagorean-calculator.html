<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagorean Theorem Calculator</title>
    <meta name="description" content="An online calculator to compute the hypotenuse or missing leg using the Pythagorean theorem.">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Pythagorean Theorem Calculator",
        "description": "A tool to calculate the hypotenuse or missing leg of a right triangle.",
        "url": "https://yourwebsite.com/pythagorean-theorem-calculator",
        "applicationCategory": "EducationalApplication"
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            text-align: center;
        }
        input, button {
            width: 80%;
            max-width: 400px;
            margin: 10px 0;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
        }
        @media (max-width: 480px) {
            input, button {
                font-size: 16px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pythagorean Theorem Calculator</h2>
        <input type="number" id="sideA" placeholder="Enter side A">
        <input type="number" id="sideB" placeholder="Enter side B">
        <button onclick="calculateHypotenuse()">Calculate Hypotenuse</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateHypotenuse() {
            let sideA = parseFloat(document.getElementById("sideA").value);
            let sideB = parseFloat(document.getElementById("sideB").value);
            
            if (sideA > 0 && sideB > 0) {
                let hypotenuse = Math.sqrt(Math.pow(sideA, 2) + Math.pow(sideB, 2));
                document.getElementById("result").innerText = `Hypotenuse: ${hypotenuse.toFixed(6)}`;
            } else {
                document.getElementById("result").innerText = "Invalid input. Enter positive values for both sides.";
            }
        }
    </script>
</body>
</html>
