<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <meta name="author" content="WhizMath">
    <title>Math Lessons - WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
        .settings-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background: white;
        }
        .dark-mode .settings-container {
            background: #1e1e1e;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">WhizMath</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="calculators.html">Calculators</a></li>
                    <li class="nav-item"><a class="nav-link" href="converters.html">Converters</a></li>
                    <li class="nav-item"><a class="nav-link" href="privacy.html">Privacy Policy</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html">Dark Mode</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="settings-container">
            <h2 class="text-center">Settings</h2>
            <div class="form-check form-switch mt-4">
                <input class="form-check-input" type="checkbox" id="darkModeToggle">
                <label class="form-check-label" for="darkModeToggle">Enable Dark Mode</label>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const darkModeToggle = document.getElementById("darkModeToggle");
            const isDarkMode = localStorage.getItem("darkMode") === "enabled";
            
            if (isDarkMode) {
                document.body.classList.add("dark-mode");
                darkModeToggle.checked = true;
            }
            
            darkModeToggle.addEventListener("change", function () {
                if (this.checked) {
                    document.body.classList.add("dark-mode");
                    localStorage.setItem("darkMode", "enabled");
                } else {
                    document.body.classList.remove("dark-mode");
                    localStorage.setItem("darkMode", "disabled");
                }
            });
        });
    </script>
</body>
</html>
