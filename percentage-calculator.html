<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quickly calculate percentages with our responsive percentage calculator. Supports percentage increase, decrease, and conversions.">
    <meta name="keywords" content="percentage calculator, math calculator, percentage increase, percentage decrease">
    <meta name="author" content="WhizMath">
    <title>Percentage Calculator - WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(to right, #4a90e2, #145da0); color: white; }
        .calculator-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .calculator-card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; }
        .btn-primary { background-color: #ff9800; border: none; }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Percentage Calculator",
        "url": "https://whizmath.com/percentage-calculator",
        "author": {
            "@type": "Person",
            "name": "WhizMath"
        },
        "description": "Easily calculate percentages for any values using our responsive percentage calculator.",
        "applicationCategory": "EducationalApplication"
    }
    </script>
</head>
<body>
    <div class="container calculator-container">
        <div class="calculator-card text-center p-4 shadow-lg">
            <h2 class="mb-4">Percentage Calculator</h2>
            <input type="number" id="value" class="form-control mb-3" placeholder="Enter Value">
            <input type="number" id="percentage" class="form-control mb-3" placeholder="Enter Percentage">
            <button class="btn btn-primary w-100" onclick="calculatePercentage()">Calculate</button>
            <h4 class="mt-3" id="result"></h4>
        </div>
    </div>
    
    <script>
        function calculatePercentage() {
            let value = parseFloat(document.getElementById("value").value);
            let percentage = parseFloat(document.getElementById("percentage").value);
            
            if (!isNaN(value) && !isNaN(percentage)) {
                let result = (value * percentage) / 100;
                document.getElementById("result").innerText = `${percentage}% of ${value} is ${result}`;
            } else {
                document.getElementById("result").innerText = "Please enter valid numbers.";
            }
        }
    </script>
    <script type='text/javascript' src='//pl26627928.profitableratecpm.com/dc/ed/3b/dced3b21bace3293dc34b16c68937c68.js'></script>
</body>
</html>
