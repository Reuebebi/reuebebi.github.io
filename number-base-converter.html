<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online Number System Converter - Convert between Decimal, Binary, Octal, and Hexadecimal easily.">
    <meta name="keywords" content="Number System Converter, Decimal to Binary, Binary to Hex, Octal to Decimal">
    <meta name="author" content="WhizMath">
    <title>Number System Converter | WhizMath</title>
    
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Number System Converter",
        "description": "Convert numbers between Decimal, Binary, Octal, and Hexadecimal easily.",
        "applicationCategory": "Educational",
        "url": "https://whizmath.com/number-system-converter"
    }
    </script>
    
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: white;
            color: black;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .converter-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center vh-100">
        <div class="converter-box">
            <h2>Number System Converter</h2>
            <label for="inputNumber" class="form-label">Enter Number:</label>
            <input type="text" id="inputNumber" class="form-control" placeholder="Enter a number">
            
            <label for="fromBase" class="form-label mt-3">From:</label>
            <select id="fromBase" class="form-select">
                <option value="10">Decimal</option>
                <option value="2">Binary</option>
                <option value="8">Octal</option>
                <option value="16">Hexadecimal</option>
            </select>
            
            <label for="toBase" class="form-label mt-3">To:</label>
            <select id="toBase" class="form-select">
                <option value="10">Decimal</option>
                <option value="2">Binary</option>
                <option value="8">Octal</option>
                <option value="16">Hexadecimal</option>
            </select>
            
            <button class="btn btn-primary mt-3 w-100" onclick="convertNumber()">Convert</button>
            <h4 class="mt-3">Result: <span id="outputResult">---</span></h4>
        </div>
    </div>
    
    <!-- JavaScript for Conversion Logic -->
    <script>
        function convertNumber() {
            let inputNumber = document.getElementById("inputNumber").value.trim();
            let fromBase = parseInt(document.getElementById("fromBase").value);
            let toBase = parseInt(document.getElementById("toBase").value);
            
            if (inputNumber === "") {
                alert("Please enter a valid number.");
                return;
            }
            
            try {
                let decimalValue = parseInt(inputNumber, fromBase);
                let convertedValue = decimalValue.toString(toBase).toUpperCase();
                document.getElementById("outputResult").textContent = convertedValue;
            } catch (error) {
                alert("Invalid input for the selected number system.");
            }
        }
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type='text/javascript' src='//pl26627928.profitableratecpm.com/dc/ed/3b/dced3b21bace3293dc34b16c68937c68.js'></script>
</body>
</html>
