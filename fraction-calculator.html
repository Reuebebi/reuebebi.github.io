<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Calculator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8470165109508371"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-8470165109508371">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #f9f9f9;
        }
        input, select, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fraction Calculator</h2>
        <input type="number" id="num1" placeholder="Numerator 1">
        <input type="number" id="den1" placeholder="Denominator 1">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>
        <input type="number" id="num2" placeholder="Numerator 2">
        <input type="number" id="den2" placeholder="Denominator 2">
        <br>
        <button onclick="calculateFraction()">Calculate</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function gcd(a, b) {
            return b === 0 ? a : gcd(b, a % b);
        }
        
        function calculateFraction() {
            let num1 = parseInt(document.getElementById("num1").value);
            let den1 = parseInt(document.getElementById("den1").value);
            let num2 = parseInt(document.getElementById("num2").value);
            let den2 = parseInt(document.getElementById("den2").value);
            let operator = document.getElementById("operator").value;
            
            if (den1 === 0 || den2 === 0) {
                document.getElementById("result").innerText = "Denominator cannot be zero!";
                return;
            }
            
            let resultNum, resultDen;
            
            switch (operator) {
                case '+':
                    resultNum = num1 * den2 + num2 * den1;
                    resultDen = den1 * den2;
                    break;
                case '-':
                    resultNum = num1 * den2 - num2 * den1;
                    resultDen = den1 * den2;
                    break;
                case '*':
                    resultNum = num1 * num2;
                    resultDen = den1 * den2;
                    break;
                case '/':
                    resultNum = num1 * den2;
                    resultDen = den1 * num2;
                    break;
            }
            
            let commonDivisor = gcd(Math.abs(resultNum), Math.abs(resultDen));
            resultNum /= commonDivisor;
            resultDen /= commonDivisor;
            
            document.getElementById("result").innerText = `Result: ${resultNum}/${resultDen}`;
        }
    </script>
</body>
</html>
