<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your multiplication skills with this challenging math quiz.">
    <meta name="keywords" content="Math Quiz, Multiplication, JavaScript, Bootstrap, Responsive">
    <meta name="author" content="WhizMath">
    <title>Multiplication Quiz | WhizMath</title>

    <meta name="google" content="notranslate">

     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8470165109508371"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { text-align: center; background: #f8f9fa; }
        .quiz-container { max-width: 500px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .question { font-size: 1.5rem; font-weight: bold; }
        .exit-button { position: absolute; top: 10px; left: 10px; background: none; border: none; cursor: pointer; }
        .exit-button svg { width: 30px; height: 30px; }
    </style>
</head>
<body>
    <button class="exit-button" onclick="window.location.href='index.html'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </button>
    <div class="container">
        <div class="quiz-container">
            <h1>Multiplication Quiz</h1>
            <p class="question" id="question"></p>
            <input type="number" id="answer" class="form-control mb-3" placeholder="Your answer">
            <button class="btn btn-primary" onclick="checkAnswer()">Submit</button>
            <p id="result" class="mt-3"></p>
            <button class="btn btn-secondary mt-2" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <script>
        let num1, num2, correctAnswer;
        function generateQuestion() {
            num1 = Math.floor(Math.random() * 20) + 1;
            num2 = Math.floor(Math.random() * 20) + 1;
            correctAnswer = num1 * num2;
            document.getElementById("question").textContent = `${num1} × ${num2} = ?`;
            document.getElementById("answer").value = "";
            document.getElementById("result").textContent = "";
        }

        function checkAnswer() {
            let userAnswer = parseInt(document.getElementById("answer").value);
            if (userAnswer === correctAnswer) {
                document.getElementById("result").textContent = "Correct! Well done.";
                document.getElementById("result").style.color = "green";
            } else {
                document.getElementById("result").textContent = "Incorrect. Try again!";
                document.getElementById("result").style.color = "red";
            }
        }

        function nextQuestion() {
            generateQuestion();
        }

        generateQuestion();
    </script>
</body>
</html>
