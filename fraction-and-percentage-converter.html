<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert between fractions and percentages easily with this free online calculator.">
    <meta name="keywords" content="Fractions to Percentage, Percentage to Fractions, Math Converter">
    <meta name="author" content="WhizMath">
    <title>Fractions & Percentage Converter | WhizMath</title>
    
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Fractions & Percentage Converter",
        "description": "Convert numbers between fractions and percentages easily.",
        "applicationCategory": "Educational",
        "url": "https://whizmath.com/fractions-percentage-converter"
    }
    </script>
    
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: white;
            color: black;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .converter-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center vh-100">
        <div class="converter-box">
            <h2>Fractions & Percentage Converter</h2>
            <label for="inputValue" class="form-label">Enter Value:</label>
            <input type="text" id="inputValue" class="form-control" placeholder="Enter fraction or percentage">
            
            <label for="convertType" class="form-label mt-3">Convert To:</label>
            <select id="convertType" class="form-select">
                <option value="fraction">Fraction</option>
                <option value="percentage">Percentage</option>
            </select>
            
            <button class="btn btn-primary mt-3 w-100" onclick="convertValue()">Convert</button>
            <h4 class="mt-3">Result: <span id="outputResult">---</span></h4>
        </div>
    </div>
    
    <!-- JavaScript for Conversion Logic -->
    <script>
        function convertValue() {
            let inputValue = document.getElementById("inputValue").value.trim();
            let convertType = document.getElementById("convertType").value;
            let outputResult = document.getElementById("outputResult");
            
            if (inputValue === "") {
                alert("Please enter a valid value.");
                return;
            }
            
            try {
                if (convertType === "percentage") {
                    let fractionParts = inputValue.split("/");
                    if (fractionParts.length === 2) {
                        let numerator = parseFloat(fractionParts[0]);
                        let denominator = parseFloat(fractionParts[1]);
                        if (denominator === 0) throw "Denominator cannot be zero.";
                        let percentage = (numerator / denominator) * 100;
                        outputResult.textContent = percentage.toFixed(2) + "%";
                    } else {
                        throw "Invalid fraction format.";
                    }
                } else {
                    let percentageValue = parseFloat(inputValue.replace("%", ""));
                    if (isNaN(percentageValue)) throw "Invalid percentage format.";
                    let fraction = percentageValue / 100;
                    outputResult.textContent = fraction.toFixed(4);
                }
            } catch (error) {
                alert("Invalid input format. Please check your entry.");
            }
        }
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
