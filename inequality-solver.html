<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inequality Solver</title>
    <meta name="description" content="An online inequality solver that solves linear and polynomial inequalities quickly and accurately.">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Inequality Solver",
        "description": "A tool to solve inequalities online.",
        "url": "https://yourwebsite.com/inequality-solver",
        "applicationCategory": "EducationalApplication"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 20px;
        }
        .container {
            max-width: 90%;
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        input, button {
            width: calc(100% - 20px);
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 15px;
            }
            input, button {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Inequality Solver</h2>
        <input type="text" id="inequality" placeholder="Enter inequality (e.g. x^2 - 4 > 0)">
        <button onclick="solveInequality()">Solve</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function solveInequality() {
            let input = document.getElementById("inequality").value;
            
            try {
                let solution = math.simplify(input).toString();
                document.getElementById("result").innerText = `Solution: ${solution}`;
            } catch (error) {
                document.getElementById("result").innerText = "Invalid Inequality. Please try again.";
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.3.1/math.min.js"></script>
</body>
</html>
