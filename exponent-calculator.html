<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quickly calculate exponents with our responsive exponent calculator. Supports any base and exponent values.">
    <meta name="keywords" content="exponent calculator, power calculator, math calculator">
    <meta name="author" content="WhizMath">
    <title>Exponent Calculator - WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <meta name="google-adsense-account" content="ca-pub-8470165109508371">
    <script async custom-element="amp-auto-ads"
        src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js">
</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8470165109508371"
     crossorigin="anonymous"></script>
    <style>
        body { background: linear-gradient(to right, #1e3c72, #2a5298); color: white; }
        .calculator-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .calculator-card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; }
        .btn-primary { background-color: #ff9800; border: none; }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Exponent Calculator",
        "url": "https://whizmath.com/exponent-calculator",
        "author": {
            "@type": "Person",
            "name": "WhizMath"
        },
        "description": "Easily calculate exponents with this responsive online exponent calculator.",
        "applicationCategory": "EducationalApplication"
    }
    </script>
</head>
<body>
    <div class="container calculator-container">
        <div class="calculator-card text-center p-4 shadow-lg">
            <h2 class="mb-4">Exponent Calculator</h2>
            <input type="number" id="base" class="form-control mb-2" placeholder="Enter base">
            <input type="number" id="exponent" class="form-control mb-3" placeholder="Enter exponent">
            <button class="btn btn-primary w-100" onclick="calculateExponent()">Calculate</button>
            <h4 class="mt-3" id="result"></h4>
        </div>
    </div>
    
    <script>
        function calculateExponent() {
            let base = parseFloat(document.getElementById("base").value);
            let exponent = parseFloat(document.getElementById("exponent").value);
            
            if (!isNaN(base) && !isNaN(exponent)) {
                let result = Math.pow(base, exponent);
                document.getElementById("result").innerText = "Result: " + result;
            } else {
                document.getElementById("result").innerText = "Please enter valid numbers for base and exponent.";
            }
        }
    </script>
</body>
</html>
