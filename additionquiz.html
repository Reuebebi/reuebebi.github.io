<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your math skills with a hard addition quiz. Challenge yourself with difficult math questions!">
    <meta name="keywords" content="Math Quiz, Addition, Hard Mode, JavaScript, Bootstrap, Game">
    <meta name="author" content="WhizMath">
    <title>Math Addition Quiz | WhizMath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cmp.gatekeeperconsent.com/min.js" data-cfasync="false"></script>
<script src="https://the.gatekeeperconsent.com/cmp.min.js" data-cfasync="false"></script>
	<script async src="//www.ezojs.com/ezoic/sa.min.js"></script>
<script>
    window.ezstandalone = window.ezstandalone || {};
    ezstandalone.cmd = ezstandalone.cmd || [];
</script>
    <style>
        body { text-align: center; background: #f8f9fa; }
        .quiz-container { max-width: 400px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .question { font-size: 1.5rem; font-weight: bold; }
        .timer { font-size: 1.2rem; color: red; margin-top: 10px; }
        .exit-button { position: absolute; top: 10px; left: 10px; background: none; border: none; cursor: pointer; }
        .exit-button svg { width: 30px; height: 30px; fill: black; }
    </style>
</head>
<body>
    <button class="exit-button" onclick="window.location.href='index.html'">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </button>
    
    <div class="container">
        <h1 class="mt-4">Math Addition Quiz</h1>
        <p>Test your math skills with this challenging quiz!</p>
        <div class="quiz-container">
            <p class="question" id="question"></p>
            <input type="number" id="answer" class="form-control mt-2" placeholder="Your answer">
            <p class="timer" id="timer">Time: 30s</p>
            <button class="btn btn-primary mt-3" onclick="submitAnswer()">Submit</button>
            <p id="score" class="mt-3">Score: 0</p>
            <p id="result"></p>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let num1, num2, correctAnswer;
        
        function generateQuestion() {
            num1 = Math.floor(Math.random() * 100) + 50;
            num2 = Math.floor(Math.random() * 100) + 50;
            correctAnswer = num1 + num2;
            document.getElementById("question").textContent = `${num1} + ${num2} = ?`;
            document.getElementById("answer").value = "";
        }
        
        function submitAnswer() {
            let userAnswer = parseInt(document.getElementById("answer").value);
            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById("result").textContent = "Correct!";
            } else {
                document.getElementById("result").textContent = "Wrong! Try Again.";
            }
            document.getElementById("score").textContent = `Score: ${score}`;
            generateQuestion();
        }
        
        function startTimer() {
            let timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").textContent = `Time: ${timeLeft}s`;
                if (timeLeft === 0) {
                    clearInterval(timerInterval);
                    document.getElementById("result").textContent = "Time's up! Your final score: " + score;
                }
            }, 1000);
        }
        
        generateQuestion();
        startTimer();
    </script>
</body>
</html>
