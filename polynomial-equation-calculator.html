<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Factorization Calculator</title>
    <meta name="description" content="A polynomial factorization calculator that factors polynomials quickly and accurately.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8470165109508371"
     crossorigin="anonymous"></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Polynomial Factorization Calculator",
        "description": "A tool to factorize polynomials online.",
        "url": "https://yourwebsite.com/polynomial-factorization-calculator",
        "applicationCategory": "EducationalApplication"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 20px;
        }
        .container {
            max-width: 90%;
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        input, button {
            width: calc(100% - 20px);
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 15px;
            }
            input, button {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Polynomial Factorization Calculator</h2>
        <input type="text" id="polynomial" placeholder="Enter polynomial (e.g. x^2 + 5x + 6)">
        <button onclick="factorizePolynomial()">Factorize</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function factorizePolynomial() {
            let input = document.getElementById("polynomial").value;
            
            try {
                let factored = algebra.parse(input).factor().toString();
                document.getElementById("result").innerText = `Factored Form: ${factored}`;
            } catch (error) {
                document.getElementById("result").innerText = "Invalid Polynomial. Please try again.";
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/algebra.js/0.2.6/algebra.min.js"></script>
</body>
</html>
