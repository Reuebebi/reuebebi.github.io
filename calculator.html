<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fully functional and responsive online calculator for quick calculations.">
    <meta name="keywords" content="Calculator, Online Calculator, Math Tool, Arithmetic Calculator">
    <meta name="author" content="WhizMath">
    <title>Calculator | WhizMath</title>
    
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Online Calculator",
        "description": "A fully responsive online calculator for basic arithmetic calculations.",
        "applicationCategory": "Educational",
        "url": "https://whizmath.com/online-calculator"
    }
    </script>
    
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .calculator {
            width: 100%;
            max-width: 400px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .calculator input {
            width: 100%;
            height: 60px;
            text-align: right;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .btn-custom {
            width: 100%;
            height: 60px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="calculator">
            <input type="text" id="display" class="form-control mb-2" disabled>
            <div class="grid-container">
                <button class="btn btn-danger btn-custom" onclick="clearDisplay()">C</button>
                <button class="btn btn-warning btn-custom" onclick="backspace()">←</button>
                <button class="btn btn-secondary btn-custom" onclick="appendInput('%')">%</button>
                <button class="btn btn-primary btn-custom" onclick="appendInput('/')">÷</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('7')">7</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('8')">8</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('9')">9</button>
                <button class="btn btn-primary btn-custom" onclick="appendInput('*')">×</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('4')">4</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('5')">5</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('6')">6</button>
                <button class="btn btn-primary btn-custom" onclick="appendInput('-')">-</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('1')">1</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('2')">2</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('3')">3</button>
                <button class="btn btn-primary btn-custom" onclick="appendInput('+')">+</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('0')">0</button>
                <button class="btn btn-light btn-custom" onclick="appendInput('.')">.</button>
                <button class="btn btn-success btn-custom" onclick="calculateResult()">=</button>
            </div>
        </div>
    </div>
    
    <script>
        function appendInput(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function backspace() {
            let display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
        }
        function calculateResult() {
            let display = document.getElementById("display");
            try {
                display.value = eval(display.value);
            } catch (e) {
                alert("Invalid Expression");
                clearDisplay();
            }
        }
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type='text/javascript' src='//pl26627928.profitableratecpm.com/dc/ed/3b/dced3b21bace3293dc34b16c68937c68.js'></script>
</body>
</html>
